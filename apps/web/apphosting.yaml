# Firebase App Hosting config for apps/web (runs on Cloud Run, Node runtime).
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# NOTE on the three secrets: create them in Cloud Secret Manager first, e.g.
#   firebase apphosting:secrets:set STRIPE_SECRET_KEY
#   firebase apphosting:secrets:set STRIPE_WEBHOOK_SECRET
#   firebase apphosting:secrets:set RESEND_API_KEY
# then grant the backend access when prompted. Do NOT put secret values here.

runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0 # scale to zero when idle (cheap; cold starts on first hit)
  maxInstances: 5
  concurrency: 80 # NOTE tune later: lower if requests are CPU-heavy

env:
  # ---- Public Firebase web config (baked into the client at build) ----
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyAPdPTCv0v7c9dsudTSNRrVQ-ReTKroGLU"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "beef-cartel.firebaseapp.com"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "beef-cartel"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "beef-cartel.firebasestorage.app"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "622019813593"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:622019813593:web:e15a312dc41be839575ec8"
    availability: [BUILD, RUNTIME]

  # ---- Public app config ----
  # NOTE: set this to your live URL. Until the custom domain is attached you can
  # temporarily use the App Hosting *.run.app URL so magic-links/redirects resolve.
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://beefcartel.com.au"
    availability: [BUILD, RUNTIME]
  # Stripe publishable key is public — plain env is fine.
  - variable: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    value: "pk_test_51TcCN0PiNcHZREkNZ0MvP6eAe4Sg2ZK3U22UM9zPUPugdGDNrtj5XnAj9eGNYtz6S32h8gLCuMlVcKbnzoHPZqNf00tv2vUAvG"
    availability: [BUILD, RUNTIME]

  # ---- Server-only config (runtime; not secret) ----
  - variable: FIREBASE_PROJECT_ID
    value: "beef-cartel"
    availability: [RUNTIME]
  - variable: ADMIN_EMAILS
    value: "jessethomson777@gmail.com,lainethomson@gmail.com,info@emeraldwebsites.com.au"
    availability: [RUNTIME]
  - variable: SUPPLIER_EMAIL
    value: "info@emeraldwebsites.com.au" # NOTE testing value — swap to the real supplier later
    availability: [RUNTIME]
  - variable: EMAIL_FROM
    value: "Beef Cartel <orders@beefcartel.com.au>"
    availability: [RUNTIME]

  # ---- Secrets (Cloud Secret Manager refs; values never live in this file) ----
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
